name: Core CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  windows-gnu:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use the self-contained GNU toolchain
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu --component clippy,rustfmt
          rustup default stable-x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - name: Feature matrix
        shell: pwsh
        run: |
          cargo clippy --no-default-features -- -D warnings
          $features = @('std', 'embedded', 'status', 'scan', 'analyze', 'sample', 'history', 'record')
          foreach ($feature in $features) {
            cargo clippy --no-default-features --features $feature -- -D warnings
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
      - run: cargo test
      - run: cargo package --locked

  msrv:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use declared MSRV
        run: |
          rustup toolchain install 1.78.0-x86_64-pc-windows-gnu
          rustup default 1.78.0-x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: cargo clippy --no-default-features -- -D warnings
      - run: cargo clippy --no-default-features --features status -- -D warnings
      - run: cargo clippy --no-default-features --features record -- -D warnings
      - run: cargo test --no-default-features --features record

  macos:
    strategy:
      matrix:
        os: [macos-15, macos-15-intel]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: cargo clippy --no-default-features -- -D warnings
      - run: cargo clippy --no-default-features --features status -- -D warnings
      - run: cargo clippy --no-default-features --features scan -- -D warnings
      - run: cargo clippy --no-default-features --features connectivity -- -D warnings

  embedded:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
      - name: Bare-metal no_std build
        run: cargo check --target thumbv7em-none-eabihf --no-default-features --features embedded
      - name: Portable code lint
        run: cargo clippy --no-default-features --features embedded -- -D warnings
      - name: Embedded API docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --no-default-features --features embedded
      - name: Adapter, parser and analysis tests
        run: cargo test --no-default-features --features std,embedded
      - name: Embedded adapter example
        run: cargo check --example embedded --no-default-features --features std,embedded
      - name: ESP-IDF adapter host contract
        run: |
          cargo clippy --manifest-path adapters/esp-idf/Cargo.toml --all-targets -- -D warnings
          cargo test --manifest-path adapters/esp-idf/Cargo.toml
      - name: Inspect ESP-IDF adapter package
        # Full verification becomes possible after radiochron 0.3.0 is on crates.io.
        run: cargo package --manifest-path adapters/esp-idf/Cargo.toml --list

  esp-idf:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ESP_IDF_VERSION: v5.4.3
      CRATE_CC_NO_DEFAULTS: "1"
    steps:
      - uses: actions/checkout@v5
      - name: Install ESP Rust toolchain
        uses: esp-rs/xtensa-toolchain@v1.7.0
        with:
          default: true
          buildtargets: esp32
          ldproxy: true
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: adapters/esp-idf
      - name: Compile native ESP-IDF adapter
        working-directory: adapters/esp-idf
        run: cargo check --target xtensa-esp32-espidf

  coverage:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - run: cargo llvm-cov --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v6
        with:
          name: radiochron-core-coverage
          path: lcov.info
