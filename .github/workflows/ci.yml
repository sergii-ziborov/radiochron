name: Core CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  windows-gnu:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use the self-contained GNU toolchain
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu --component clippy,rustfmt
          rustup default stable-x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - name: Feature matrix
        shell: pwsh
        run: |
          cargo clippy --no-default-features -- -D warnings
          $features = @('status', 'scan', 'analyze', 'sample', 'history', 'record')
          foreach ($feature in $features) {
            cargo clippy --no-default-features --features $feature -- -D warnings
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
      - run: cargo test
      - run: cargo package --locked

  msrv:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use declared MSRV
        run: |
          rustup toolchain install 1.78.0-x86_64-pc-windows-gnu
          rustup default 1.78.0-x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: cargo clippy --no-default-features -- -D warnings
      - run: cargo clippy --no-default-features --features record -- -D warnings
      - run: cargo test --no-default-features --features record

  coverage:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - run: cargo llvm-cov --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v4
        with:
          name: radiochron-core-coverage
          path: lcov.info
